<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Task Manager</h1>
            <p class="subtitle">Manage your tasks efficiently</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedTasks">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingTasks">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <div class="add-task-section">
            <h2>Add New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <input
                        type="text"
                        id="taskTitle"
                        placeholder="Task title"
                        required
                        autocomplete="off"
                    >
                </div>
                <div class="form-group">
                    <textarea
                        id="taskDescription"
                        placeholder="Task description (optional)"
                        rows="3"
                    ></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span>+ Add Task</span>
                </button>
            </form>
        </div>

        <div class="tasks-section">
            <div class="tasks-header">
                <h2>Tasks</h2>
                <button id="refreshBtn" class="btn btn-secondary" onclick="loadTasks()">
                    🔄 Refresh
                </button>
            </div>

            <div id="loadingIndicator" class="loading">Loading tasks...</div>
            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <div id="tasksList" class="tasks-list">
                <!-- Tasks will be dynamically inserted here -->
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <p>📝 No tasks yet. Create your first task above!</p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Task</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editTaskId">
                <div class="form-group">
                    <label for="editTaskTitle">Title</label>
                    <input
                        type="text"
                        id="editTaskTitle"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="editTaskDescription">Description</label>
                    <textarea
                        id="editTaskDescription"
                        rows="3"
                    ></textarea>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="editTaskCompleted">
                        <span>Mark as completed</span>
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
